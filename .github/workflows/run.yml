name: 墨水屏综合看板推送

on:
  schedule:
    - cron: '42 0,4,8,12 * * *'    # 北京8点、12点、16点、20点
    - cron: '22 2,6,10,14 * * *'   # 北京10点、14点、18点、22点（保底）
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 获取代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 安装 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: pip install requests pillow zhdate

      - name: 运行！生成图片并推送
        env:
          ZECTRIX_API_KEY: ${{ secrets.ZECTRIX_API_KEY }}
          ZECTRIX_MAC_1: ${{ secrets.ZECTRIX_MAC_1 }}
          ZECTRIX_MAC_2: ${{ secrets.ZECTRIX_MAC_2 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AMAP_WEATHER_KEY: ${{ secrets.AMAP_WEATHER_KEY }}
        run: python main.py
