name: Keep Alive

on:
  schedule:
    - cron: '0 0 1 * *'   # 每月 1 号 UTC 0 点运行
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit --allow-empty -m "chore: monthly keepalive"
          git push
